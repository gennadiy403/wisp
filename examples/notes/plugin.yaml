name: notes
description: Classify and save voice notes with AI
trigger: shift+fn
classifier_model: claude-haiku-4-5-20251001

# Where to save notes. Supports {year} and {month} placeholders.
output_dir: ~/wisp-notes/{year}/{month}
index_file: ~/wisp-notes/index/recent.jsonl

# Extra terms to seed Whisper — reduces misrecognitions for domain vocabulary.
whisper_prompt: ""
